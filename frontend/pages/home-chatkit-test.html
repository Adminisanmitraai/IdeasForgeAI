      stroke-linejoin: round;

<!-- IF-CHATKIT-WIDGET-MOUNT-START -->
<script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js" async></script>

<script>
(function(){
  const CHATKIT_API_URL =
    (location.hostname === "192.168.1.7" || location.hostname === "127.0.0.1" || location.hostname === "localhost")
      ? "http://192.168.1.7:5052/api/chatkit"
      : "https://ideasforgeai-api.onrender.com/api/chatkit";

  // Add your real domain key later as:
  // ?domainKey=YOUR_DOMAIN_KEY
  const params = new URLSearchParams(window.location.search);
  const DOMAIN_KEY = params.get("domainKey") || "local-dev";

  const mount = document.getElementById("chatkit-mount");
  const status = document.getElementById("chatkit-status");

  function showStatus(message) {
    if (!status) return;
    status.textContent = message;
    status.classList.add("show");
  }

  function hideStatus() {
    if (!status) return;
    status.classList.remove("show");
  }

  async function mountChatKit() {
    try {
      if (!mount) return;

      if (!window.customElements) {
        showStatus("ChatKit could not load: custom elements unavailable.");
        return;
      }

      await customElements.whenDefined("openai-chatkit");

      mount.innerHTML = "";

      const chatkit = document.createElement("openai-chatkit");

      chatkit.setOptions({
        api: {
          url: CHATKIT_API_URL,
          domainKey: DOMAIN_KEY,
          fetch(input, init) {
            const nextInit = init || {};
            const headers = new Headers(nextInit.headers || {});
            headers.set("x-ideasforge-user", "ideasforgeai-local-test");
            return fetch(input, {
              ...nextInit,
              headers
            });
          }
        },
        startScreen: {
          greeting: "How can IdeasForgeAI help you create today?",
          prompts: [
            "Create a landing page plan",
            "Build an app idea",
            "Help me write code",
            "Plan a professional workflow"
          ]
        },
        composer: {
          placeholder: "Ask IdeasForgeAI..."
        },
        theme: {
          colorScheme: "dark",
          accentColor: "#9B7CFF"
        }
      });

      chatkit.style.width = "100%";
      chatkit.style.height = "100%";
      chatkit.style.display = "block";

      mount.appendChild(chatkit);

      if (DOMAIN_KEY === "local-dev") {
        showStatus("ChatKit widget mounted. Add ?domainKey=YOUR_DOMAIN_KEY if the widget asks for a registered domain key.");
      } else {
        hideStatus();
      }
    } catch (err) {
      console.error("ChatKit mount failed:", err);
      showStatus("ChatKit mount failed: " + (err && err.message ? err.message : String(err)));
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", mountChatKit);
  } else {
    mountChatKit();
  }

  setTimeout(mountChatKit, 800);
  setTimeout(mountChatKit, 1800);
})();
</script>
<!-- IF-CHATKIT-WIDGET-MOUNT-END -->

<div class="chatkit-debug-panel" id="chatkit-debug-panel"></div>

<script id="chatkit-blank-debug-script">
(function(){
  const panel = document.getElementById("chatkit-debug-panel");

  function showDebug(label, data) {
    if (!panel) return;

    let text = "";
    try {
      text = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    } catch (e) {
      text = String(data);
    }

    panel.textContent = label + ":\n" + text;
    panel.classList.add("show");
    console.log(label, data);
  }

  window.addEventListener("chatkit.error", function(event){
    showDebug("chatkit.error", event.detail || event);
  });

  window.addEventListener("chatkit.log", function(event){
    console.log("chatkit.log", event.detail || event);
  });

  window.addEventListener("error", function(event){
    if (String(event.message || "").toLowerCase().includes("chatkit")) {
      showDebug("window.error", event.message);
    }
  });

  window.addEventListener("unhandledrejection", function(event){
    const reason = event.reason || "";
    if (String(reason).toLowerCase().includes("chatkit") || String(reason).toLowerCase().includes("cors")) {
      showDebug("unhandledrejection", String(reason));
    }
  });
})();
</script>
<!-- IF-CHATKIT-BLANK-DEBUG-END -->
