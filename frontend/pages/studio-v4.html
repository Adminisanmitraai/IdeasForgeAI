<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IdeasForgeAI | AI Product Builder</title>
  <link rel="stylesheet" href="./studio-v4.css">
</head>
<body>
  <main class="studio-v4-shell" aria-label="IdeasForgeAI builder">
    <header class="studio-v4-toolbar">
      <div class="toolbar-left">
        <a class="brand-lockup" href="../index.html" aria-label="IdeasForgeAI home">
          <span class="brand-mark" aria-hidden="true">
            <span class="sparkle-main"></span>
            <span class="sparkle-dot sparkle-dot-one"></span>
            <span class="sparkle-dot sparkle-dot-two"></span>
          </span>
          <span class="brand-copy">
            <strong>IdeasForgeAI</strong>
            <span>AI Product Builder</span>
          </span>
        </a>
        <button class="project-selector" type="button" aria-label="Select project">
          <span>AI Product Builder</span>
          <span class="chevron" aria-hidden="true"></span>
        </button>
      </div>

      <div class="toolbar-center">
        <nav class="mode-switcher" aria-label="Builder mode">
          <button class="mode-button is-active" type="button">Preview</button>
          <button class="mode-button" type="button">Code</button>
          <button class="mode-button" type="button">Database</button>
        </nav>

        <div class="device-url-cluster">
          <nav class="preview-switcher" aria-label="Preview size">
            <button class="preview-button is-active" type="button" data-preview-mode="mobile" title="Mobile" aria-label="Mobile preview">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="7" y="3" width="10" height="18" rx="2.5"></rect>
                <path d="M10.5 18h3"></path>
              </svg>
            </button>
            <button class="preview-button" type="button" data-preview-mode="tablet" title="Tablet" aria-label="Tablet preview">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="5" y="3" width="14" height="18" rx="2.8"></rect>
                <path d="M11 18h2"></path>
              </svg>
            </button>
            <button class="preview-button" type="button" data-preview-mode="laptop" title="Laptop" aria-label="Laptop preview">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 6.5h14v9H5z"></path>
                <path d="M3.5 18h17"></path>
                <path d="M8.5 15.5 7.5 18"></path>
                <path d="m15.5 15.5 1 2.5"></path>
              </svg>
            </button>
          </nav>

          <label class="url-preview-pill" aria-label="Preview URL">
            <svg class="url-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8.5"></circle>
              <path d="M3.8 12h16.4"></path>
              <path d="M12 3.5c2.2 2.3 3.3 5.1 3.3 8.5s-1.1 6.2-3.3 8.5"></path>
              <path d="M12 3.5C9.8 5.8 8.7 8.6 8.7 12s1.1 6.2 3.3 8.5"></path>
            </svg>
            <input type="text" value="ideasforge.local/mobile-preview" readonly data-preview-url>
            <button class="open-preview-button" type="button" disabled title="Preview opening coming later">Open</button>
          </label>
        </div>
      </div>

      <div class="toolbar-right">
        <button class="profile-button" type="button" aria-label="Profile">
          <span aria-hidden="true">R</span>
        </button>
        <button class="secondary-button" type="button">Share</button>
        <button class="primary-button" type="button">Publish</button>
      </div>
    </header>

    <section class="studio-v4-workspace" aria-label="Studio workspace">
      <aside class="chat-panel" aria-label="IdeasForgeAI chat">
        <header class="chat-panel-header">
          <div class="chat-header-menu-wrap">
            <button class="chat-header-menu-button" type="button" aria-label="Open chat menu" aria-expanded="false" data-chat-menu-toggle>
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
            </button>
            <div class="chat-header-menu" data-chat-menu hidden>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 8.5h7a4 4 0 0 1 0 8H9l-4 3v-7a4 4 0 0 1 2-4Z"></path>
                  <path d="M16 5v6"></path>
                  <path d="M13 8h6"></path>
                </svg>
                <span>New Chat</span>
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="8"></circle>
                  <path d="M12 7v5l3 2"></path>
                </svg>
                <span>Chat History</span>
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5H10l2 2h5.5A2.5 2.5 0 0 1 20 9.5v7A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5Z"></path>
                </svg>
                <span>Projects</span>
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="5" width="16" height="14" rx="2"></rect>
                  <path d="M4 10h16"></path>
                  <path d="M10 10v9"></path>
                </svg>
                <span>Templates</span>
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"></path>
                  <path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.4 1a7.5 7.5 0 0 0-2-1.2L14.2 3h-4.4l-.3 2.7a7.5 7.5 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.4-1a7.5 7.5 0 0 0 2 1.2l.3 2.7h4.4l.3-2.7a7.5 7.5 0 0 0 2-1.2l2.4 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2Z"></path>
                </svg>
                <span>Settings</span>
              </button>
            </div>
          </div>
          <span class="chat-title-group">
            <strong>AI Assistant</strong>
            <span>IdeasForgeAI Product Builder</span>
          </span>
          <button class="chat-panel-close-button" type="button" aria-label="Collapse chat panel" title="Collapse panel">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="16" height="14" rx="2"></rect>
              <path d="M9 5v14"></path>
              <path d="m15 9-3 3 3 3"></path>
            </svg>
          </button>
        </header>

        <div class="chat-stream" data-chat-stream aria-live="polite">
          <article class="chat-message assistant-message">
            Hi, I'm IdeasForgeAI. Tell me what you want to build, and I'll turn your idea into a polished app or website preview.
          </article>
          <article class="chat-message assistant-message">
            What kind of product should we start with?
          </article>
        </div>

        <form class="chat-composer" data-chat-form>
          <div class="attachment-control">
            <button class="composer-tool-button" type="button" aria-label="Add attachment" aria-expanded="false" data-attachment-toggle>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
            </button>
            <div class="attachment-menu" data-attachment-menu hidden>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 8h3l1.5-2h5L16 8h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2Z"></path>
                  <circle cx="12" cy="13.5" r="3"></circle>
                </svg>
                <span>Camera</span>
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="5" width="16" height="14" rx="2"></rect>
                  <path d="m7 16 3.5-4 3 3 1.5-2 2 3"></path>
                  <circle cx="8.5" cy="9" r="1"></circle>
                </svg>
                <span>Photos</span>
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 3.5h6l4 4V20a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 6 20V5A1.5 1.5 0 0 1 7.5 3.5Z"></path>
                  <path d="M13 3.5v5h5"></path>
                  <path d="M9 13h6"></path>
                  <path d="M9 16h4"></path>
                </svg>
                <span>Files</span>
              </button>
            </div>
          </div>
          <textarea data-chat-input rows="1" placeholder="Describe your idea..." aria-label="Describe your idea"></textarea>
          <div class="composer-actions">
            <button class="composer-icon-button" type="button" aria-label="Record voice">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3Z"></path>
                <path d="M19 11a7 7 0 0 1-14 0"></path>
                <path d="M12 18v3"></path>
                <path d="M9 21h6"></path>
              </svg>
            </button>
            <button class="composer-submit-button" type="submit" aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
            </button>
          </div>
        </form>
      </aside>

      <section class="preview-placeholder" aria-label="Future preview area"></section>
    </section>
  </main>
  <script src="./studio-v4.js" defer></script>
</body>
</html>
