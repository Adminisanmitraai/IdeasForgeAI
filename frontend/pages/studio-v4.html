<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IdeasForgeAI</title>
  <link rel="stylesheet" href="./studio-v4.css" />
</head>
<body>
  <main class="if-shell">
    <section class="if-phone">
      <div class="if-statusbar">
        <span>9:02</span>
        <div class="if-status-icons">
          <span>▮▮▮</span>
          <span>⌁</span>
          <span class="if-battery"></span>
        </div>
      </div>

      <header class="if-header">
        <button class="if-icon-btn if-menu" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>

        <div class="if-brand">
          <div class="if-logo">✦</div>
          <div>
            <div class="if-brand-name">IdeasForgeAI</div>
            <div class="if-brand-sub">Create · Code · Work</div>
          </div>
        </div>

        <div class="if-actions">
          <button class="if-square-btn" aria-label="Share">
            <span>⇧</span>
          </button>
          <button class="if-primary-btn" aria-label="Upload">
            <span>↟</span>
          </button>
        </div>
      </header>

      <section class="if-hero">
        <h1>What do you want to create,<br />code, or work on today?</h1>
        <p>Choose a mode or simply describe your task.</p>
      </section>

      <section class="if-card-list">
        <button class="if-card" data-mode="studio">
          <span class="if-card-icon if-studio-icon">
            <span class="if-mini-window"></span>
            <span class="if-mini-cursor">▸</span>
          </span>
          <span class="if-card-copy">
            <strong>Forge<span>Studio</span></strong>
            <em>Create apps, websites, UI, images, logos, documents.</em>
          </span>
          <span class="if-card-arrow">›</span>
        </button>

        <button class="if-card" data-mode="code">
          <span class="if-card-icon if-code-icon">
            <span>&lt;/&gt;</span>
          </span>
          <span class="if-card-copy">
            <strong>Forge<span>Code</span></strong>
            <em>Analyze projects, write code, fix errors, test, deploy.</em>
          </span>
          <span class="if-card-arrow">›</span>
        </button>

        <button class="if-card" data-mode="work">
          <span class="if-card-icon if-work-icon">
            <span>•••</span>
          </span>
          <span class="if-card-copy">
            <strong>Forge<span>Work</span></strong>
            <em>AI workspace for documents, research, tasks, reports.</em>
          </span>
          <span class="if-card-arrow">›</span>
        </button>
      </section>

      <form class="if-composer">
        <button type="button" class="if-plus" aria-label="Attach">+</button>
        <label class="if-input-wrap">
          <input type="text" placeholder="Ask..." />
          <button type="button" class="if-mic" aria-label="Voice">♩</button>
        </label>
        <button class="if-send" aria-label="Send">↑</button>
      </form>

      <div class="if-browserbar" aria-hidden="true">
        <span class="if-browser-circle">‹</span>
        <span class="if-url">
          <span class="if-puzzle">▣</span>
          ideasforgeai.com
          <span class="if-refresh">↻</span>
        </span>
        <span class="if-browser-circle">•••</span>
      </div>

      <div class="if-home-indicator" aria-hidden="true"></div>
    </section>
  </main>

  <script src="./studio-v4.js"></script>
</body>
</html>
