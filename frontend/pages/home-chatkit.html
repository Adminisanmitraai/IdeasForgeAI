<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#000000">
  <title>IdeasForgeAI Chat</title>

  <script
    src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js"
    async
  ></script>

  <style>
    :root {
      --viewport-height: 100dvh;
      --viewport-offset-top: 0px;
      --header-height: 104px;
      --page-gap: 16px;
      --bottom-space: max(0px, env(safe-area-inset-bottom));
      --purple: #9b78ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
      color: #fff;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .page {
      position: fixed;
      top: var(--viewport-offset-top);
      left: 0;
      width: 100vw;
      height: var(--viewport-height);
      display: grid;
      grid-template-rows:
        var(--header-height)
        minmax(0, 1fr)
        var(--bottom-space);
      overflow: hidden;
      background:
        radial-gradient(
          circle at 56% 16%,
          rgba(116, 79, 255, 0.15),
          transparent 31%
        ),
        #000;
    }

    .header {
      min-width: 0;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding:
        max(16px, env(safe-area-inset-top))
        13px
        8px;
    }

    .header-button {
      width: 46px;
      height: 46px;
      margin: 0;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      background: linear-gradient(180deg, #292c32, #14161a);
      color: #fff;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 8px 24px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

    .header-button:active {
      transform: scale(0.96);
    }

    .header-button svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      overflow: hidden;
    }

    .brand-mark {
      flex: 0 0 auto;
      color: var(--purple);
      font-size: 32px;
      line-height: 1;
      filter: drop-shadow(0 0 15px rgba(155, 120, 255, 0.55));
    }

    .brand-name {
      min-width: 0;
      overflow: hidden;
      color: #fff;
      font-size: clamp(20px, 5.5vw, 25px);
      font-weight: 780;
      line-height: 1;
      letter-spacing: -0.055em;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .brand-name span {
      color: var(--purple);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-region {
      min-height: 0;
      padding: 0 var(--page-gap);
      overflow: hidden;
    }

    .chat-card {
      width: min(100%, 980px);
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.22);
      border-radius: 32px 32px 0 0;
      background: #fff;
      color: #111;
    }

    openai-chatkit {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .toast {
      position: fixed;
      z-index: 20;
      left: 50%;
      bottom: calc(var(--bottom-space) + 18px);
      max-width: calc(100vw - 40px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(20, 20, 23, 0.94);
      color: #fff;
      font-size: 13px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 390px) {
      :root {
        --header-height: 100px;
        --page-gap: 13px;
      }

      .header {
        grid-template-columns: 44px minmax(0, 1fr) auto;
        gap: 7px;
        padding-left: 10px;
        padding-right: 10px;
      }

      .header-button {
        width: 43px;
        height: 43px;
        border-radius: 15px;
      }

      .brand {
        gap: 7px;
      }

      .brand-mark {
        font-size: 28px;
      }

      .brand-name {
        font-size: 19px;
      }

      .header-actions {
        gap: 6px;
      }

      .chat-card {
        border-radius: 29px 29px 0 0;
      }
    }

    @media (min-width: 769px) {
      :root {
        --header-height: 96px;
        --page-gap: 22px;
        --bottom-space: 18px;
      }

      .brand {
        justify-content: flex-start;
      }

      .chat-card {
        border-radius: 28px;
      }
    }
  </style>

<!-- IF-CHATKIT-PHASE1-HEADER-START -->
<style id="if-chatkit-phase1-header">
  .brand {
    justify-content: flex-start !important;
    overflow: visible;
    margin-left: -8px;
  }

  .brand-full-logo {
    display: block;
    width: min(100%, 286px);
    max-width: 286px;
    height: 48px;
    object-fit: contain;
    object-position: left center;
    filter: drop-shadow(0 0 15px rgba(128, 91, 255, 0.18));
  }

  @media (max-width: 430px) {
    .brand {
      margin-left: -10px;
    }

    .brand-full-logo {
      width: min(100%, 250px);
      max-width: 250px;
      height: 44px;
    }
  }

  @media (max-width: 390px) {
    .brand {
      margin-left: -8px;
    }

    .brand-full-logo {
      width: min(100%, 222px);
      max-width: 222px;
      height: 41px;
    }
  }

  @media (max-width: 370px) {
    .brand-full-logo {
      width: min(100%, 205px);
      max-width: 205px;
      height: 38px;
    }
  }
</style>
<!-- IF-CHATKIT-PHASE1-HEADER-END -->

<!-- IF-CHATKIT-PHASE2-COMPOSER-START -->
<style id="if-chatkit-phase2-composer">
  /*
    Increase the usable white chat surface.
    ChatKit keeps full ownership of its composer, mic, send and stop controls.
  */
  .chat-region {
    padding-bottom: 0 !important;
  }

  .chat-card {
    height: calc(100% + 10px);
    min-height: 0;
  }

  @media (max-width: 768px) {
    :root {
      --bottom-space: max(0px, env(safe-area-inset-bottom));
    }

    .page {
      grid-template-rows:
        var(--header-height)
        minmax(0, 1fr)
        var(--bottom-space);
    }

    .chat-card {
      height: calc(100% + 12px);
    }
  }

  @media (max-width: 430px) {
    .chat-card {
      height: calc(100% + 14px);
    }
  }

  @media (min-width: 769px) {
    .chat-card {
      height: 100%;
    }
  }
</style>
<!-- IF-CHATKIT-PHASE2-COMPOSER-END -->
</head>

<body>
  <div class="page">
    <header class="header">
      <button
        id="historyButton"
        class="header-button"
        type="button"
        aria-label="Chat history"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 18h16"></path>
        </svg>
      </button>

      <div class="brand" aria-label="IdeasForgeAI">
        <img
          class="brand-full-logo"
          src="../assets/brand/ideasforgeai-logo-full.png"
          alt="IdeasForgeAI"
        >
      </div>

      <div class="header-actions">
        <button
          id="languageButton"
          class="header-button"
          type="button"
          aria-label="Change language"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18"></path>
            <path d="M12 3c2.4 2.5 3.6 5.5 3.6 9S14.4 18.5 12 21"></path>
            <path d="M12 3C9.6 5.5 8.4 8.5 8.4 12S9.6 18.5 12 21"></path>
          </svg>
        </button>

        <button
          id="profileButton"
          class="header-button"
          type="button"
          aria-label="Profile"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="3.5"></circle>
            <path d="M5 20c.8-4 3.2-6 7-6s6.2 2 7 6"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="chat-region">
      <section class="chat-card">
        <openai-chatkit id="chatkit"></openai-chatkit>
      </section>
    </main>

    <div aria-hidden="true"></div>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script>
    (() => {
      const BACKEND_URL =
        "https://ideasforgeai-api.onrender.com/api/chatkit";

      const params = new URLSearchParams(window.location.search);
      const domainKey = params.get("domainKey") || "";

      const root = document.documentElement;
      const chatkit = document.getElementById("chatkit");
      const toast = document.getElementById("toast");

      let toastTimer = 0;
      let configureAttempts = 0;

      function showToast(message) {
        if (!toast) return;

        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("visible");

        toastTimer = setTimeout(() => {
          toast.classList.remove("visible");
        }, 3000);
      }

      function updateViewport() {
        const viewport = window.visualViewport;

        if (!viewport) {
          root.style.setProperty(
            "--viewport-height",
            `${window.innerHeight}px`
          );

          root.style.setProperty("--viewport-offset-top", "0px");
          return;
        }

        root.style.setProperty(
          "--viewport-height",
          `${Math.round(viewport.height)}px`
        );

        root.style.setProperty(
          "--viewport-offset-top",
          `${Math.round(viewport.offsetTop)}px`
        );
      }

      async function configureChatKit() {
        if (!chatkit || typeof chatkit.setOptions !== "function") {
          configureAttempts += 1;

          if (configureAttempts < 100) {
            setTimeout(configureChatKit, 120);
          }

          return;
        }

        if (!domainKey) {
          console.error("Missing ChatKit domain key.");
          showToast("Missing ChatKit domain key.");
          return;
        }

        try {
          await chatkit.setOptions({
            api: {
              url: BACKEND_URL,
              domainKey,
              uploadStrategy: {
                type: "two_phase"
              }
            },

            theme: {
              colorScheme: "light"
            },

            history: {
              enabled: true
            },

            composer: {
              placeholder: "Message the AI",
              attachments: {
                enabled: true,
                maxCount: 5,
                maxSize: 20971520
              },
              dictation: {
                enabled: true
              }
            }
          });

          console.info("IdeasForgeAI native ChatKit ready");
        } catch (error) {
          console.error("ChatKit initialization failed:", error);

          showToast(
            error && error.message
              ? error.message
              : "ChatKit could not start."
          );
        }
      }

      function runAvailable(actions, fallbackMessage) {
        for (const action of actions) {
          try {
            const result = action();

            if (result !== undefined) {
              return true;
            }
          } catch {}
        }

        showToast(fallbackMessage);
        return false;
      }

      document
        .getElementById("historyButton")
        .addEventListener("click", () => {
          runAvailable(
            [
              () => chatkit?.openHistory?.(),
              () => chatkit?.showHistory?.(),
              () => chatkit?.toggleHistory?.()
            ],
            "History is available inside ChatKit."
          );
        });
document
        .getElementById("profileButton")
        .addEventListener("click", () => {
          showToast("Profile settings will be connected next.");
        });

      updateViewport();

      window.addEventListener("resize", updateViewport, {
        passive: true
      });

      window.addEventListener("orientationchange", () => {
        setTimeout(updateViewport, 120);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener(
          "resize",
          updateViewport,
          { passive: true }
        );

        window.visualViewport.addEventListener(
          "scroll",
          updateViewport,
          { passive: true }
        );
      }

      configureChatKit();
    })();
  </script>
</body>
</html>
