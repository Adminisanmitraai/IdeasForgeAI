<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convera</title>
  <link rel="stylesheet" href="./convera.css" />
</head>
<body>
  <main class="convera-shell">
    <header class="topbar">
      <div class="top-left">
        <button class="icon-btn" id="menuBtn">⋮</button>
        <img src="./assets/convera_logo_symbol.png" class="brand-icon" alt="Convera" />
      </div>

      <div class="top-right">
        <button class="icon-btn" id="cameraBtn">📷</button>
        <button class="add-btn" id="addUserBtn">+</button>
      </div>
    </header>

    <section class="chat-thread" id="chatThread">
      <div class="empty-state">
        <img src="./assets/convera_logo_symbol.png" alt="Convera" />
        <p>Start a conversation</p>
      </div>
    </section>

    <footer class="composer">
      <button class="plus-btn" id="plusBtn">+</button>
      <input id="messageInput" type="text" placeholder="Message..." />
      <button class="mic-btn" id="micBtn">🎙</button>
      <button class="send-btn" id="sendBtn">➤</button>
    </footer>
  </main>

  <script src="./convera.js"></script>
</body>
</html>
