<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
  >
  <meta name="theme-color" content="#f8faff">
  <title>Convera</title>
  <link rel="stylesheet" href="./convera.css?v=7">
</head>

<body>
  <aside class="convera-drawer" id="converaDrawer" aria-hidden="true">
    <div class="drawer-profile">
      <div class="drawer-avatar">R</div>
      <div>
        <strong>Ranjan</strong>
        <span>Online</span>
      </div>
    </div>

    <div class="drawer-actions">
      <button type="button">＋ New chat</button>
      <button type="button">✦ New Convera chat</button>
      <button type="button">▣ New project</button>
    </div>

    <nav class="drawer-nav">
      <button type="button" class="active">Chats</button>
      <button type="button">Convera AI</button>
      <button type="button">Projects</button>
      <button type="button">Groups</button>
      <button type="button">Favourites</button>
      <button type="button">Files</button>
      <button type="button">Tasks</button>
      <button type="button">Calendar</button>
    </nav>

    <section class="drawer-section">
      <label>Recent Convera chats</label>
      <button type="button">Product strategy</button>
      <button type="button">Mobile UI refinement</button>
      <button type="button">Financial planning</button>
    </section>

    <section class="drawer-section">
      <label>Projects</label>
      <button type="button">IdeasForgeAI</button>
      <button type="button">Convera</button>
      <button type="button">KisanMitraAI</button>
    </section>

    <footer class="drawer-footer">
      <button type="button">Settings</button>
      <button type="button">Help</button>
    </footer>
  </aside>

  <button
    class="drawer-overlay"
    id="drawerOverlay"
    type="button"
    aria-label="Close menu"
  ></button>
  <aside
    class="navigation-drawer"
    id="navigationDrawer"
    aria-hidden="true"
  >
    <div class="drawer-profile">
      <div class="profile-avatar">R</div>

      <div class="profile-copy">
        <strong>Ranjan</strong>
        <span><i></i> Online</span>
      </div>
    </div>

    <div class="drawer-actions">
      <button type="button" data-drawer-action="new-human-chat">
        <span class="drawer-action-icon">＋</span>
        <span>New chat</span>
      </button>

      <button type="button" data-drawer-action="new-ai-chat">
        <span class="drawer-action-icon convera-action">✦</span>
        <span>New Convera chat</span>
      </button>

      <button type="button" data-drawer-action="new-project">
        <span class="drawer-action-icon">▣</span>
        <span>New project</span>
      </button>
    </div>

    <nav class="drawer-navigation" aria-label="Main navigation">
      <button class="drawer-item active" type="button" data-section="chats">
        <span>Chats</span>
        <small>12</small>
      </button>

      <button class="drawer-item" type="button" data-section="convera-ai">
        <span>Convera AI</span>
      </button>

      <button class="drawer-item" type="button" data-section="projects">
        <span>Projects</span>
        <small>4</small>
      </button>

      <button class="drawer-item" type="button" data-section="groups">
        <span>Groups</span>
      </button>

      <button class="drawer-item" type="button" data-section="favorites">
        <span>Favourites</span>
      </button>

      <div class="drawer-divider"></div>

      <button class="drawer-item" type="button" data-section="files">
        <span>Files</span>
      </button>

      <button class="drawer-item" type="button" data-section="tasks">
        <span>Tasks</span>
      </button>

      <button class="drawer-item" type="button" data-section="calendar">
        <span>Calendar</span>
      </button>

      <button class="drawer-item" type="button" data-section="notifications">
        <span>Notifications</span>
      </button>
    </nav>

    <div class="drawer-recent">
      <div class="drawer-section-title">Recent Convera chats</div>

      <button type="button">Product strategy</button>
      <button type="button">Mobile UI refinement</button>
      <button type="button">Financial planning</button>
    </div>

    <div class="drawer-projects">
      <div class="drawer-section-title">Projects</div>

      <button type="button">IdeasForgeAI</button>
      <button type="button">Convera</button>
      <button type="button">KisanMitraAI</button>
    </div>

    <div class="drawer-footer">
      <button type="button" data-section="settings">Settings</button>
      <button type="button" data-section="help">Help</button>
    </div>
  </aside>

  <button
    class="drawer-backdrop"
    id="drawerBackdrop"
    type="button"
    aria-label="Close navigation"
  ></button>

  <main class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button
  class="soft-button menu-button"
  id="menuBtn"
  type="button"
  aria-label="Open navigation"
  aria-expanded="false"
>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M5 7h14"></path>
      <path d="M5 12h14"></path>
      <path d="M5 17h14"></path>
    </svg>
  </button>

        <button class="logo-button" id="logoBtn" aria-label="Convera">
          <svg class="convera-logo" viewBox="0 0 64 64">
            <defs>
              <linearGradient id="logoGradient" x1="10" y1="7" x2="55" y2="58">
                <stop offset="0" stop-color="#20d6a2"></stop>
                <stop offset=".48" stop-color="#1688ff"></stop>
                <stop offset="1" stop-color="#5227d8"></stop>
              </linearGradient>
            </defs>
            <path
              fill="url(#logoGradient)"
              d="M33 5C17.5 5 6 16.2 6 30.1c0 6.4 2.5 12.3 7.1 16.7L10.7 58l11-5.3A29.3 29.3 0 0 0 33 55c7.9 0 14.8-3 19.7-7.8l-7.4-7.4A17.4 17.4 0 0 1 33 44.7c-9.2 0-16.3-6.4-16.3-14.6S23.8 15.5 33 15.5c5 0 9.4 1.9 12.3 5l7.4-7.4C47.8 8 40.8 5 33 5Z"
            ></path>
            <circle cx="25.5" cy="30" r="2.3" fill="#fff"></circle>
            <circle cx="33" cy="30" r="2.3" fill="#fff"></circle>
            <circle cx="40.5" cy="30" r="2.3" fill="#fff"></circle>
          </svg>
        </button>
      </div>

      <div class="topbar-right">
        <button class="soft-button" id="cameraBtn" aria-label="Camera">
          <svg viewBox="0 0 24 24">
            <path d="M8.8 6.5 10.2 4.8h3.6l1.4 1.7H18a2.2 2.2 0 0 1 2.2 2.2v8.6a2.2 2.2 0 0 1-2.2 2.2H6a2.2 2.2 0 0 1-2.2-2.2V8.7A2.2 2.2 0 0 1 6 6.5h2.8Z"></path>
            <circle cx="12" cy="13" r="3.6"></circle>
          </svg>
        </button>

        <button class="add-button" id="addUserBtn" aria-label="Add user">
          <svg viewBox="0 0 24 24">
            <path d="M12 6v12M6 12h12"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="content">
      <h1>Chat</h1>

      <div class="search-panel">
        <svg class="search-icon" viewBox="0 0 24 24">
          <circle cx="10.5" cy="10.5" r="6.5"></circle>
          <path d="m15.5 15.5 4 4"></path>
        </svg>

        <input
          id="searchInput"
          type="search"
          placeholder="Search conversations..."
          autocomplete="off"
        >

        <button id="filterBtn" class="filter-button" aria-label="Search options">
          <svg viewBox="0 0 24 24">
            <path d="M4 6h10M18 6h2M4 12h3M11 12h9M4 18h7M15 18h5"></path>
            <circle cx="16" cy="6" r="2"></circle>
            <circle cx="9" cy="12" r="2"></circle>
            <circle cx="13" cy="18" r="2"></circle>
          </svg>
        </button>
      </div>

      <div class="filter-row" id="filterRow">
        <button class="filter-chip ai-chip active" data-filter="ai">
          <svg class="mini-logo" viewBox="0 0 64 64">
            <defs>
              <linearGradient id="miniGradient" x1="10" y1="7" x2="55" y2="58">
                <stop offset="0" stop-color="#20d6a2"></stop>
                <stop offset=".48" stop-color="#1688ff"></stop>
                <stop offset="1" stop-color="#5227d8"></stop>
              </linearGradient>
            </defs>
            <path fill="url(#miniGradient)" d="M33 5C17.5 5 6 16.2 6 30.1c0 6.4 2.5 12.3 7.1 16.7L10.7 58l11-5.3A29.3 29.3 0 0 0 33 55c7.9 0 14.8-3 19.7-7.8l-7.4-7.4A17.4 17.4 0 0 1 33 44.7c-9.2 0-16.3-6.4-16.3-14.6S23.8 15.5 33 15.5c5 0 9.4 1.9 12.3 5l7.4-7.4C47.8 8 40.8 5 33 5Z"></path>
            <circle cx="25.5" cy="30" r="2.3" fill="#fff"></circle>
            <circle cx="33" cy="30" r="2.3" fill="#fff"></circle>
            <circle cx="40.5" cy="30" r="2.3" fill="#fff"></circle>
          </svg>
          <span>Chat with<br>Convera</span>
        </button>

        <button class="filter-chip" data-filter="all">All</button>
        <button class="filter-chip" data-filter="unread">Unread</button>
        <button class="filter-chip" data-filter="favorites">Favourites</button>
        <button class="filter-chip" data-filter="groups">Groups</button>
        <button class="filter-chip add-filter" id="newFilterBtn" aria-label="Add filter">+</button>
      </div>

      <div class="conversation-list" id="conversationList"></div>

      <div class="empty-results" id="emptyResults" hidden>
        No matching conversations
      </div>
    </section>

    <form class="composer" id="composer">
      <button class="composer-plus" id="attachBtn" type="button" aria-label="Attach">
        <svg viewBox="0 0 24 24">
          <path d="M12 6v12M6 12h12"></path>
        </svg>
      </button>

      <input
        id="messageInput"
        type="text"
        placeholder="Message..."
        autocomplete="off"
        enterkeyhint="send"
      >

      <button class="mic-button" id="micBtn" type="button" aria-label="Voice note">
        <svg viewBox="0 0 24 24">
          <rect x="8.4" y="3" width="7.2" height="11.5" rx="3.6"></rect>
          <path d="M5.8 11.2a6.2 6.2 0 0 0 12.4 0M12 17.4V21M9.5 21h5"></path>
        </svg>
      </button>

      <button class="send-button" type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24">
          <path d="M5 5.5 19 12 5 18.5l2-5.1 7.4-1.4L7 10.6 5 5.5Z"></path>
        </svg>
      </button>
    </form>

    <div class="toast" id="toast"></div>
  </main>

  <script src="./convera.js?v=7"></script>
</body>
</html>
